# -------------------------
# Defaults (shared settings)
# -------------------------
[default]
# Training
d_is_training = 1
d_train_epochs = 1
d_patience = 20
d_learning_rate = 0.001
d_batch_size = 32
d_stride = 5
d_lradj = "type7"
d_num_workers = 0

# Data
d_root_path = "../dataset"
d_data = "TRF"
d_data_path = "traffic.csv"
d_freq = "h"
d_forecast_type = "M"
d_in_features = 862
d_out_features = 862
d_inverse_transform = false

# Model
d_model = "PatchTST"
d_model_input_type = "x_only"

# PatchTST params
m_individual = 1
m_e_layers = 3
m_n_heads = 16
m_d_model = 128
m_d_ff = 256
m_dropout = 0.2
m_fc_dropout = 0.2
m_head_dropout = 0
m_patch_len = 16
m_stride = 8
m_revin = 1
m_affine = 0
m_subtract_last = 0
m_decomposition = 0
m_kernel_size = 25
m_padding_patch = "end"

