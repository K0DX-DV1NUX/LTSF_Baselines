# -------------------------
# Defaults (shared settings)
# -------------------------
[default]
# Training
d_is_training = 1
d_train_epochs = 1
d_patience = 20
d_learning_rate = 0.001
d_batch_size = 512
d_stride = 5
d_lradj = "type7"
d_num_workers = 0

# Data
d_root_path = "../dataset"
d_data = "ETTm2"
d_data_path = "ETTm2.csv"
d_freq = "h"
d_forecast_type = "M"
d_in_features = 7
d_out_features = 7
d_inverse_transform = false

# Model
d_model = "iTransformer"
d_model_input_type = "x_mark_dec_incld"

# Other params
m_e_layers = 2
m_n_heads = 8
m_d_model = 256
m_d_ff = 256
m_dropout = 0.05
m_fc_dropout = 0.3
m_use_norm = true
m_embed = "timeF"
m_class_strategy = "projection"
m_factor = 1
m_activation = "gelu"

# -------------------------
# GPU
# -------------------------
[gpu]

# -------------------------
# Runs
# -------------------------
[[runs]]
d_seq_len = 336
d_pred_len = 48

